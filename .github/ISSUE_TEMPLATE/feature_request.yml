name: Feature request
description: Suggest an improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Features that add tracking, telemetry, scraping, or high-rate API polling are out of scope.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the change.
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy or API impact
      description: Does this add a permission, network service, stored user data, or more API traffic?
    validations:
      required: true
